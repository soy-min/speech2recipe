<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech to Recipe</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>🎙️ Speech to Recipe</h1>
    <p class="subtitle">Speak your recipe, get it structured instantly</p>
    <nav>
      <a href="index.html" class="active">Record</a>
      <a href="book.html">Recipe Book</a>
    </nav>
  </header>

  <main>
    <section class="settings-panel" id="settings-panel">
      <details>
        <summary>⚙️ Settings</summary>
        <div class="settings-content">
          <label for="api-key">Anthropic API Key</label>
          <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" />
          <button id="save-key">Save Key</button>
          <p class="hint">Your key is stored locally in your browser only.</p>
        </div>
      </details>
    </section>

    <section class="record-panel">
      <div class="mic-container">
        <button id="record-btn" class="mic-btn" aria-label="Start recording" disabled>
          <span class="mic-icon">🎙️</span>
        </button>
        <p id="record-status">Set your API key to begin</p>
      </div>

      <div class="transcript-panel" id="transcript-panel" hidden>
        <h2>Transcript</h2>
        <p id="transcript-text" class="transcript-text"></p>
        <div class="transcript-actions">
          <button id="clear-btn">Clear</button>
          <button id="structure-btn" class="primary">Structure Recipe →</button>
        </div>
      </div>
    </section>

    <section class="result-panel" id="result-panel" hidden>
      <div class="loading" id="loading" hidden>
        <div class="spinner"></div>
        <p>Structuring your recipe…</p>
      </div>
      <div id="recipe-output"></div>
      <div class="result-actions" id="result-actions" hidden>
        <button id="save-recipe-btn" class="primary">Save to Recipe Book</button>
        <button id="try-again-btn">Try Again</button>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
