<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Recipe Book — Speech to Recipe</title>
  <meta name="description" content="Homemade recipes, structured and ready to cook." />
  <meta property="og:title" content="My Recipe Book — Speech to Recipe" />
  <meta property="og:description" content="Homemade recipes, structured and ready to cook." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/book.css" />
</head>
<body>
  <header>
    <h1>📖 My Recipe Book</h1>
    <nav>
      <a href="index.html">Record</a>
      <a href="book.html" class="active">Recipe Book</a>
    </nav>
  </header>

  <main>
    <div class="book-toolbar">
      <input type="search" id="search" placeholder="Search recipes…" />
      <button id="export-btn">Export HTML</button>
    </div>

    <div id="recipe-grid" class="recipe-grid">
      <p class="empty-state" id="empty-state">No recipes yet. <a href="index.html">Record your first recipe →</a></p>
    </div>
  </main>

  <div class="modal" id="recipe-modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="js/version.js"></script>
  <script type="module" src="js/book.js"></script>
  <footer class="version-footer">
    <span class="version-badge" id="version-badge">loading…</span>
  </footer>
  <script>
    (function () {
      var v = typeof APP_VERSION !== 'undefined' ? APP_VERSION : { version: 'dev', commit: 'local', date: '–' };
      var badge = document.getElementById('version-badge');
      if (badge) {
        badge.textContent = v.version;
        badge.title = 'Commit: ' + v.commit + ' · Build: ' + v.date;
      }
    })();
  </script>
</body>
</html>
