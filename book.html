<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Recipe Book — Speech to Recipe</title>
  <meta name="description" content="Homemade recipes, structured and ready to cook." />
  <meta property="og:title" content="My Recipe Book — Speech to Recipe" />
  <meta property="og:description" content="Homemade recipes, structured and ready to cook." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/book.css" />
  <link rel="stylesheet" href="css/legal.css" />
</head>
<body>
  <header>
    <h1>📖 My Recipe Book</h1>
    <nav>
      <a href="index.html">Record</a>
      <a href="book.html" class="active">Recipe Book</a>
    </nav>
  </header>

  <main>
    <div class="book-banner section-with-bg">
      <img src="images/hero.jpg" alt="" role="presentation" loading="lazy" decoding="async"
           class="section-bg-img" style="object-position: center 60%;" />
      <div class="hero-overlay overlay"></div>
      <div class="book-banner-content">
        <h1 class="book-banner-title">My Recipe Book</h1>
        <p class="book-banner-sub">Your saved recipes, ready to cook</p>
      </div>
    </div>

    <div class="app-sections">
      <div class="book-toolbar">
        <input type="search" id="search" placeholder="Search recipes…" />
        <button id="export-btn">Export HTML</button>
      </div>

      <div id="recipe-grid" class="recipe-grid">
        <p class="empty-state" id="empty-state">No recipes yet. <a href="index.html">Record your first recipe →</a></p>
      </div>
    </div>
  </main>

  <div class="modal" id="recipe-modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="js/version.js"></script>
  <script type="module" src="js/book.js"></script>

  <footer class="site-footer">
    <div class="footer-inner">
      <div>
        <div class="footer-brand">🎙️ Speech to Recipe</div>
        <div class="footer-tagline">Voice-powered recipe creation, instantly.</div>
      </div>
      <nav class="footer-nav">
        <a href="index.html">Record</a>
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>
      </nav>
    </div>
    <hr class="footer-divider" />
    <p class="footer-legal">
      &copy; 2025 Speech to Recipe &nbsp;·&nbsp;
      <span class="version-badge" id="version-badge">loading…</span>
    </p>
  </footer>
  <script>
    (function () {
      var v = typeof APP_VERSION !== 'undefined' ? APP_VERSION : { version: 'dev', commit: 'local', date: '–' };
      var badge = document.getElementById('version-badge');
      if (badge) {
        badge.textContent = v.version;
        badge.title = 'Commit: ' + v.commit + ' · Build: ' + v.date;
      }
    })();
  </script>
</body>
</html>
